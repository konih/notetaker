name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token for every job (C4). No job writes to the repo, opens PRs, or
# publishes packages; the gitleaks `secrets` job only reads history. Clears the 7
# `actions/missing-workflow-permissions` code-scanning warnings.
permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Pytest (with coverage floor)
        # --cov-fail-under is set in [tool.coverage.report] (pyproject.toml). Fails the
        # build when coverage drops below the OQ-1 floor (ratcheting toward 90%).
        run: uv run --python ${{ matrix.python-version }} pytest --cov=live_meeting_transcriber --cov-report=term-missing

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12

      # mypy needs the extras' real types (torch, numpy, huggingface_hub, pyannote): some
      # modules carry `# type: ignore` that is *unused* when the extra is absent, so a
      # dev-only sync reddens strict mypy. --all-extras matches the local `task check`.
      - name: Sync all extras
        run: uv sync --python 3.12 --all-extras

      - name: Mypy
        run: uv run mypy .

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Sync dev tools
        run: uv sync --python 3.12 --extra dev

      # Whole-tree scope (`.`), matching Taskfile.yml `task check`, so scripts/ is linted too.
      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  e2e:
    name: E2E smoke (ffmpeg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Sync dev tools
        run: uv sync --python 3.12 --extra dev

      - name: Install video prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          bash scripts/install_video_prereqs.sh

      - name: E2E pytest
        run: uv run pytest tests/e2e -q

  integration:
    name: Integration lane (ffmpeg, deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Sync dev tools
        run: uv sync --python 3.12 --extra dev

      # The integration lane mocks external network boundaries (e.g. yt-dlp) and runs
      # against committed fixtures, so it only needs ffmpeg — not the yt-dlp prereq script.
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Deterministic — no RUN_INTEGRATION_TESTS gate.
      - name: Integration pytest
        run: uv run pytest -m integration -q

  arch:
    name: Architecture boundaries (import-linter)
    runs-on: ubuntu-latest
    # Blocking since A9: all three hexagonal contracts must hold. The same check
    # also runs in-process via tests/architecture/ in the unit test suite.
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Sync dev tools
        run: uv sync --python 3.12 --extra dev

      - name: Import Linter
        run: uv run lint-imports

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
